version: '3.8'

services:
  # 1. Database chính (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: factoring_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_password
      - POSTGRES_DB=factoring_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Cache & Message Broker (Redis) - Dùng cho Celery sau này
  redis:
    image: redis:7-alpine
    container_name: factoring_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: